# Dependabot — Python 의존성 / GitHub Actions 모두 주간 PR.
# 같은 도메인 (pyproject) 의존성은 grouped PR 로 묶어 노이즈 감소.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-prod:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      python-dev:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
