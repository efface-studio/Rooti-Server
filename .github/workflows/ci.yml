# =============================================================================
#  Rooti-Server CI — lint + test + dependency audit
#
#  - lint:    ruff check + ruff format --check
#  - test:    pytest (unit + integration with testcontainers Postgres)
#  - audit:   pip-audit (CVE 스캔)
#
#  패키지/환경 관리는 Poetry. (pipx install poetry → poetry install → poetry run …)
# =============================================================================
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# concurrency: 같은 브랜치에서 새 push 가 들어오면 이전 job 취소 (러너 비용 절감)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: poetry
      - name: Install deps
        run: poetry install --no-interaction
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: Ruff lint
        run: poetry run ruff check .

  test:
    runs-on: ubuntu-latest
    # 통합 테스트가 testcontainers Postgres 를 쓰므로 Docker 가 필요한데
    # ubuntu-latest 러너에는 기본 설치돼 있음.
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: poetry
      - name: Install deps
        run: poetry install --no-interaction
      - name: Run tests
        env:
          # 더미 — 테스트는 conftest 가 testcontainers 로 진짜 DB 부팅
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-jwt-secret-must-be-at-least-32-bytes-long-xxxxxxx' }}
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: ci
          DB_USERNAME: ci
          DB_PASSWORD: ci
          DB_SSL_REQUIRED: 'false'
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: poetry run pytest -v --maxfail=1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: poetry
      - name: Install deps
        run: poetry install --no-interaction
      - name: Run pip-audit
        # 알려진 취약점이 있는 의존성에 의존 시 실패 (pip-audit 기본 동작: CVE 발견 → exit 1).
        # non-package 모드라 editable self-package 가 없어 --skip-editable 불필요.
        run: poetry run pip-audit
