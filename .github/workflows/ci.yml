# =============================================================================
#  Rooti-Server CI — lint + test + dependency audit
#
#  - lint:    ruff check + ruff format --check
#  - test:    pytest (unit + integration with testcontainers Postgres)
#  - audit:   pip-audit (CVE 스캔)
# =============================================================================
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# concurrency: 같은 브랜치에서 새 push 가 들어오면 이전 job 취소 (러너 비용 절감)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install ruff
        run: uv tool install ruff
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    # 통합 테스트가 testcontainers Postgres 를 쓰므로 Docker 가 필요한데
    # ubuntu-latest 러너에는 기본 설치돼 있음.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Setup Python 3.12
        run: uv python install 3.12
      - name: Install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Run tests
        env:
          # 더미 — 테스트는 conftest 가 testcontainers 로 진짜 DB 부팅
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-jwt-secret-must-be-at-least-32-bytes-long-xxxxxxx' }}
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: ci
          DB_USERNAME: ci
          DB_PASSWORD: ci
          DB_SSL_REQUIRED: 'false'
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: uv run pytest -v --maxfail=1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Setup Python 3.12
        run: uv python install 3.12
      - name: Install pip-audit + project deps
        run: |
          uv venv
          uv pip install pip-audit
          uv pip install -e .
      - name: Run pip-audit
        # 알려진 취약점이 있는 의존성에 의존 시 실패. dependabot 도 같이 활성.
        # --skip-editable: 우리 editable 패키지(rooti-server)는 PyPI 에 없어 감사 불가 →
        # --strict 와 함께 쓰면 그것 때문에 실패하므로 editable 만 건너뜀.
        run: uv run pip-audit --strict --skip-editable
