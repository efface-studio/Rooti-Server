# Ruff: Spotless(googleJavaFormat) + Checkstyle 등가물.
# Java 디렉토리는 건드리지 않음.
target-version = "py312"
line-length = 100
extend-exclude = [
  "build/",
  ".venv/",
  "src/",                # Java 소스
  "legacy-migration/",
]

[lint]
select = [
  "E", "F", "W",   # pycodestyle / pyflakes
  "I",             # isort
  "B",             # bugbear
  "UP",            # pyupgrade
  "N",             # pep8-naming
  "SIM",           # simplify
  "RUF",           # ruff 전용
  "ASYNC",         # async 안티패턴
  "S",             # bandit (보안)
  "DTZ",           # datetime 타임존
  "T20",           # print 금지
]
ignore = [
  "E501",          # line-length 은 formatter 가 처리
  "S101",          # assert 사용 (테스트에서 필요)
  "B008",          # FastAPI Depends() 패턴
  # --- 의도적 설계 결정 (false-positive) ---
  "N818",          # 예외 이름은 *Exception (Java 패리티 — UserNotFoundException 등). Error 접미사 강제 안 함
  "DTZ005",        # naive datetime.now() — DB 가 TIMESTAMP WITHOUT TZ + 서버 TZ=Asia/Seoul (Java LocalDateTime 동일)
  # --- PEP 695 제네릭 마이그레이션은 별도 (Pydantic v2 제네릭 호환 검증 후) ---
  "UP046",         # class Foo(Generic[T]) → class Foo[T] (Pydantic 호환 확인 필요)
  "UP047",         # def f[T]() — 동일
]

[lint.per-file-ignores]
"tests/**" = ["S", "DTZ", "T20", "RUF059"]   # 테스트: 보안/타임존/print/unused-unpack 완화
"app/main.py" = ["T20"]                       # 부트스트랩 로그 허용
"app/core/security.py" = ["S105", "S106"]    # token_type 'ACCESS'/'REFRESH' 는 비밀번호 아님 (false-positive)
"app/core/rate_limit.py" = ["S110"]          # best-effort JWT decode — 실패해도 IP fallback (의도적)
"scripts/**" = ["S608", "T201"]              # 시드/CLI: 테이블명은 하드코딩 상수(SQL injection 무관), print 는 정상 출력

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
