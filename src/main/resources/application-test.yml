# ---- Test profile (uses Testcontainers) ----
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

rooti:
  security:
    jwt:
      secret: "test-secret-key-for-unit-tests-must-be-at-least-512-bits-long-blah-blah-blah-blah-blah"
