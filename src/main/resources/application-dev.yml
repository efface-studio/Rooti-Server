# =============================================================================
#  Rooti Server -- dev profile (AWS RDS db-vitsdevelopmentserver)
#
#  Activate with:  SPRING_PROFILES_ACTIVE=dev
#
#  대상 RDS:
#    이름     : db-vitsdevelopmentserver
#    엔드포인트: db-vitsdevelopmentserver.cdmci4ki2lyr.ap-northeast-2.rds.amazonaws.com
#    포트     : 5432
#    DB 이름  : postgres
#    엔진     : PostgreSQL
#    인스턴스 : db.t3.micro  (max_connections ≈ 87)
#    AZ       : ap-northeast-2a
#    퍼블릭   : 예 (보안 그룹: database-postgresql, rds-ec2-2)
#    IAM 인증 : 활성화됨
#
#  소형 인스턴스(t3.micro) 라 connection 한도가 ~87 이므로, 풀 사이즈는 더 보수적으로
#  잡습니다 (max 5, min 1). 동시 개발자 + dev preview 합쳐도 conn 30 이내가 안전선.
# =============================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?reWriteBatchedInserts=true&tcpKeepAlive=true&socketTimeout=30&loginTimeout=10&prepareThreshold=${PG_PREPARE_THRESHOLD:0}&ApplicationName=rooti-server-dev
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN:1}

  jpa:
    # dev 에서는 SQL 표시 켜두면 디버깅이 편하지만 양이 많아지면 prod-like 로 끄세요.
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

logging:
  level:
    root: INFO
    com.rooti: DEBUG
    org.hibernate.SQL: INFO
    # bind 파라미터까지 보고 싶으면 다음 줄을 TRACE 로:
    # org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: WARN
