# =============================================================================
#  Rooti Server - application.yml (공통 설정)
#  프로필별 오버라이드는 application-{profile}.yml 참조
# =============================================================================
spring:
  application:
    name: rooti-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  mvc:
    problemdetails:
      enabled: true       # RFC 7807
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false # 정적 자원 자동 매핑 비활성 (보안)

  # ----- DataSource -----
  # PgJDBC 파라미터 설명 (RDS / RDS Proxy 비용·안정성 최적화):
  #   reWriteBatchedInserts=true  → 다중 INSERT 를 한 라운드트립으로 묶어 IOPS·CPU 절감
  #   tcpKeepAlive=true           → NLB / RDS Proxy 가 끊은 idle 연결을 더 빨리 탐지
  #   socketTimeout=30            → 응답 30초 넘으면 끊고 풀에 반환 (좀비 connection 방지)
  #   loginTimeout=10             → RDS 페일오버 시 hang 방지
  #   prepareThreshold=0          → RDS Proxy(pgbouncer transaction pooling) 호환.
  #                                 RDS Proxy 안 쓰면 1~5 로 올리면 prepared stmt 캐시 효과↑
  #   ApplicationName=rooti-server → pg_stat_activity 에서 어느 앱인지 식별
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?reWriteBatchedInserts=true&tcpKeepAlive=true&socketTimeout=30&loginTimeout=10&prepareThreshold=${PG_PREPARE_THRESHOLD:0}&ApplicationName=rooti-server
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # HikariCP 설정은 application-{profile}.yml 에서 환경별로 오버라이드합니다.
    # 공통 디폴트는 로컬 개발 기준 (낮은 동시성, 빠른 fail).
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:8}
      minimum-idle: ${DB_POOL_MIN:1}
      connection-timeout: 5000
      idle-timeout: 60000             # 1분 — RDS idle 정리보다 먼저 우리가 줄임
      max-lifetime: 1700000           # 28분 — RDS 기본 idle timeout(30분) 전에 회수
      keepalive-time: 60000           # 1분 — 살아있는지 ping 으로 좀비 conn 방지
      leak-detection-threshold: 30000 # 30초 잡고 있는 conn 은 leak 의심으로 로그
      pool-name: rooti-hikari

  jpa:
    open-in-view: false    # ★ 시니어 디폴트
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway 가 관리
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # provider_disables_autocommit=true:
        #   readOnly 트랜잭션이 첫 SQL 전까지 conn 을 점유하지 않게 해서, 한 요청당
        #   conn-acquired 시간을 짧게 만듭니다. 같은 RDS 풀로 더 많은 동시 요청 처리 가능
        #   → 같은 트래픽이면 더 작은 인스턴스 클래스로도 충분 (비용 직결).
        connection:
          provider_disables_autocommit: true
        jdbc:
          batch_size: 50
          time_zone: Asia/Seoul
          lob:
            non_contextual_creation: true
        order_inserts: true
        order_updates: true
        # JDBC batch 가 동작하려면 batch_versioned_data 도 true 여야 @Version 엔티티에서도 묶임
        batch_versioned_data: true
        default_batch_fetch_size: 100
        query:
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true
          # 같은 모양의 쿼리를 캐싱해 plan-build 단계를 절약
          plan_cache_max_size: 2048

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2

server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true
    session:
      cookie:
        http-only: true
        secure: false       # prod 에서 true 로
        same-site: lax
  compression:
    enabled: true
  http2:
    enabled: true
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  observations:
    key-values:
      app: rooti-server

# ---- Springdoc / OpenAPI ----
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    persist-authorization: true

# ---- App-specific properties (rooti.*) ----
rooti:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
      refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
      issuer: "rooti"
      header-name: "Authorization"
      token-prefix: "Bearer "
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      exposed-headers: "Authorization,Content-Disposition"
      allow-credentials: true
      max-age: 3600
    public-paths:
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/v1/auth/login
      - /api/v1/auth/refresh
      - /api/v1/auth/caregivers/signup
      - /api/v1/public/**
      - /media/**
  storage:
    driver: ${STORAGE_DRIVER:local}
    local:
      root: ${STORAGE_LOCAL_ROOT:./media}
      public-url: ${STORAGE_PUBLIC_URL:http://localhost:8080/media}
  firebase:
    credential-json-path: ${FIREBASE_CREDENTIAL_JSON_PATH:}
    enabled: false
  resend:
    enabled: ${RESEND_ENABLED:false}
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM:Rooti <noreply@rooti.io>}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    enabled: false
  version:
    latest: "1.0.0"
    min-supported: "1.0.0"

# ---- Logging ----
logging:
  level:
    root: INFO
    com.rooti: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%X{traceId:-}]){yellow} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
