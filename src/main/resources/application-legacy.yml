# =============================================================================
#  Rooti Server -- legacy compatibility profile.
#
#  Activate alongside `prod` when pointing at the existing Django v1 RDS:
#    SPRING_PROFILES_ACTIVE=prod,legacy
#
#  In this mode the application:
#    1. uses the v1 (Django) table names (`works_*`, `care_*`, `extendauth_*`,
#       `auth_user`) instead of the V2 layout
#    2. keeps Hibernate at `none` so it never tries to validate the V2 schema
#       against the v1 columns
#    3. turns Flyway off (v1 schema is not managed by us)
#
#  The actual table-name mapping lives in
#  `com.rooti.global.config.LegacySchemaNamingStrategy`, which is wired only
#  under this profile via `@Profile("legacy")`.
# =============================================================================
spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        physical_naming_strategy: com.rooti.global.config.LegacySchemaNamingStrategy
  flyway:
    enabled: false

rooti:
  schema:
    mode: legacy
