# ---- Production overrides ----
spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  servlet:
    session:
      cookie:
        secure: true

logging:
  level:
    root: INFO
    com.rooti: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
