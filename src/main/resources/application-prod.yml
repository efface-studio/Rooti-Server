# =============================================================================
#  Rooti Server -- production profile (AWS RDS Postgres + ElastiCache Redis)
#
#  Activate with:  SPRING_PROFILES_ACTIVE=prod
#
#  The schema is V2 (Spring) only. If the target RDS instance still holds the
#  legacy Django v1 schema, run the migration once (see
#  legacy-migration/README.md) before pointing the server at it.
# =============================================================================
spring:
  datasource:
    # `?sslmode=require` is appended automatically when DB_SSL_REQUIRED=true
    # (see DataSourceUrlPostProcessor).
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?reWriteBatchedInserts=true&ApplicationName=rooti-server
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    # If you're attaching to a previously-Django RDS that has been migrated by
    # legacy-migration/V1-django-to-spring.sql, set the baseline to "2" so the
    # next Flyway script we ship (V3, V4 ...) lands cleanly on top.
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

server:
  servlet:
    session:
      cookie:
        secure: true

logging:
  level:
    root: INFO
    com.rooti: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
