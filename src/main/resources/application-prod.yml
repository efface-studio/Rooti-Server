# =============================================================================
#  Rooti Server -- production profile (AWS RDS Postgres + ElastiCache Redis)
#
#  Activate with:  SPRING_PROFILES_ACTIVE=prod
#
#  비용 절감 메모:
#  - HikariCP 풀 사이즈는 동시 활성 사용자 × 1.2 정도가 적정. 관리자 앱 동시 사용자
#    수십명 수준이면 인스턴스당 풀 10 이하로 잡고, 그에 맞춰 RDS 인스턴스 클래스를
#    한 단계 작게 가져갈 수 있습니다 (db.t4g.medium → db.t4g.small 등).
#  - PgJDBC 안전 파라미터(tcpKeepAlive / socketTimeout / prepareThreshold) 는 공통
#    application.yml 의 URL 에서 이미 적용. 운영 환경만 추가로 SSL 강제 + 비밀번호
#    secrets manager 주입.
#  - RDS Proxy 를 쓰는 경우 PG_PREPARE_THRESHOLD=0 그대로 두세요 (pgbouncer transaction
#    pooling 호환). 직결이라면 PG_PREPARE_THRESHOLD=5 로 올려 prepared statement 캐시
#    효과를 살릴 수 있습니다.
# =============================================================================
spring:
  datasource:
    # `?sslmode=require` is appended automatically when DB_SSL_REQUIRED=true
    # (see DataSourceUrlPostProcessor).
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?reWriteBatchedInserts=true&tcpKeepAlive=true&socketTimeout=30&loginTimeout=10&prepareThreshold=${PG_PREPARE_THRESHOLD:0}&ApplicationName=rooti-server
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # 운영 RDS cost-tuned 풀:
    #   admin 앱 동시 활성 사용자 ≈ 수십명 가정 → 풀 10 이하면 인스턴스 클래스를
    #   한 단계 작게(db.t4g.small ~ medium) 잡아도 conn 한도(150~300) 안전.
    #   환경 변수로 오버라이드 가능: 스파이크 발생 시 일시 상향, 평시 복원.
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:1}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    # If you're attaching to a previously-Django RDS that has been migrated by
    # legacy-migration/V1-django-to-spring.sql, set the baseline to "2" so the
    # next Flyway script we ship (V3, V4 ...) lands cleanly on top.
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

server:
  servlet:
    session:
      cookie:
        secure: true

logging:
  level:
    root: INFO
    com.rooti: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
